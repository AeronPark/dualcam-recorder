name: DualCam
options:
  bundleIdPrefix: com.dualcam
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_NSCameraUsageDescription: "DualCam needs camera access to record video"
    INFOPLIST_KEY_NSMicrophoneUsageDescription: "DualCam needs microphone access to record audio"
    INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "DualCam needs photo library access to save recordings"
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"

targets:
  DualCam:
    type: application
    platform: iOS
    sources:
      - DualCam
    info:
      path: DualCam/Info.plist
      properties:
        CFBundleDisplayName: "DualCam"
        NSCameraUsageDescription: "DualCam needs camera access to record video"
        NSMicrophoneUsageDescription: "DualCam needs microphone access to record audio"
        NSPhotoLibraryAddUsageDescription: "DualCam needs photo library access to save recordings"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dualcam.app
